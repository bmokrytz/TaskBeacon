<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Beacon</title>
</head>
<body>
    <div class="button_container">
        <button id="back_btn" class="submit_button" >Back</button>
    </div>

    <form id="add-task-form" action="/api/auth/register" method="POST">
        <h1 id="tasks-root-title">Add task</h1>
        <div class="add-task-input-field">
            <label for="title" class="add-task-form-label">Title:</label>
            <input class="add-task-form-input" id="title" name="title" required>
        </div>
        <div class="add-task-input-field">
            <label for="description" class="add-task-form-label">Description:</label>
            <input class="add-task-form-input" id="description" name="description">
        </div>
        <div class="add-task-input-field">
            <label for="due_date" class="add-task-form-label">Due date:</label>
            <input type="datetime-local" class="add-task-form-input" id="due_date" name="due_date">
        </div>
        <button type="submit" class="submit_button">Submit</button>
    </form>

    <style>
        .button_container {
            display: flex;
            justify-content: flex-end;
        }

        .submit_button {
            padding: 10px 20px;
            font-size: 20px;
        }

        #tasks-root-title {
            font-size: 42px;
            padding-bottom: 1cm;
            font-weight: 700;
            letter-spacing: -0.5px;
            color: #1f2937;
        }

        .add-task-input-field {
            margin-bottom: 5%;
        }

        .add-task-form-input {
            width: 40%;
        }

        .add-task-form-label {
            font-size: 1cm;
        }

        body {
            background-color: #adb3c9;
        }

        #add-task-form-title {
            font-size: 2cm;
        }

        #add-task-form {
            width: 70%;
            margin: 0 auto;
        }
    </style>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
        const form = document.getElementById("add-task-form");
        const token = localStorage.getItem("token");

        if (!token) {
        alert("Not logged in");
        window.location.href = "/";
        return;
        }

        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const title = document.getElementById("title").value.trim();
            const description = document.getElementById("description").value;
            const raw = document.getElementById("due_date").value;

            let due_date = null;
            if (raw !== "") {
                due_date = datetimeLocalToUTCISOString(raw);
            }


            const res = await fetch("/api/tasks", {
            method: "POST",
            headers: { 
                "Content-Type": "application/json",
                "Authorization": `Bearer ${token}`
             },
            body: JSON.stringify({ title, description, due_date }),
            });


            if (!res.ok) {
            const text = await res.text();
            alert(`Task creation failed`);
            return;
            }

            window.location.href = "/tasks.html";
        });

        const back_btn = document.getElementById("back_btn");

        back_btn.addEventListener("click", () => {

            window.location.href = "/tasks.html";
        });
        });

        function datetimeLocalToUTCISOString(raw) {
            // raw: "YYYY-MM-DDTHH:MM" or "YYYY-MM-DDTHH:MM:SS"
            const [datePart, timePart] = raw.split("T");
            const [y, m, d] = datePart.split("-").map(Number);
            const [hh, mm, ss = "0"] = timePart.split(":");
            const dt = new Date(y, m - 1, d, Number(hh), Number(mm), Number(ss)); // local time
            return dt.toISOString(); // UTC with Z
        }

    </script>
</body>
</html>
