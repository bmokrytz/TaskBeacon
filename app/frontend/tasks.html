<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Task Beacon - Tasks</title>

        <link rel="stylesheet" href="/static/css/tasks.css">
        <script src="/static/js/tasks.js" defer></script>
    </head>

    <body>

        <div class="page">


            <!-- Top Bar -->
            <div class="top_bar">
                <button class="logout_btn">Logout</button>
            </div>

            <!-- Main container -->
            <div class="container">

                <div class="container_header">
                    <h1 class="page_title">Tasks</h1>
                    <button class="add_btn">+ Add Task</button>
                </div>

                <div class="error_box"></div>

                <!-- Task list -->
                <div class="task_list" id="task_list">
                </div>

                <!-- Shown when task list is empty -->
                <div class="empty_state" id="empty_state" style="display: none;">
                    <p class="empty_text">No tasks yet. Add one to get started.</p>
                </div>

            </div>

        </div>

    </body>

</html>
