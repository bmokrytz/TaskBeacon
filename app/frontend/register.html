<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Task Beacon</title>

        <link rel="stylesheet" href="/static/css/register.css">
        <script src="/static/js/register.js" defer></script>
    </head>


    <body>
        <div class="page">



            <!-- Top Bar -->
            <div class="top_bar">
            <button class="home_btn">Home</button>
            </div>


            <!-- Login card container -->
            <div class="card">

                <div class="logo_area">
                    <div class="logo_text">
                        <h1 class="app_name">Create your account</h1>
                    </div>
                </div>
                <div class="error_box"></div>

                <!-- Login form -->
                <form class="form">

                    <div class="field_group">
                        <label class="label">Email</label>
                        <input class="input" id="email" type="email" placeholder="you@example.com" autocomplete="username" required />
                    </div>
                    <div class="field_group">
                        <label class="label">Password</label>
                        <input class="input" id="password" type="password" placeholder="••••••••" required />
                    </div>
                    <div class="field_group">
                        <label class="label">Confirm password</label>
                        <input class="input" id="confirm_password" type="password" placeholder="••••••••" required />
                    </div>
                    <button class="submit_btn">Login</button>

                </form>

            </div>
            

        </div>
        
    </body>


</html>
