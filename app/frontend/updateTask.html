<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Task Beacon - Update Task</title>

        <link rel="stylesheet" href="/static/css/updateTask.css">
        <script src="/static/js/updateTask.js" defer></script>
    </head>
    <body>

        <div class="page">

            <!-- Decorations -->
            <div class="blob1"></div>
            <div class="blob2"></div>

            <!-- Top Bar -->
            <div class="top_bar">
                <button id="back_btn" class="back_btn">Back</button>
            </div>

            <!-- Card -->
            <div class="card">

                <h1 class="page_title">Update Task</h1>
                <div class="error_box"></div>

                <form id="update-task-form">

                    <div class="field_group">
                        <label class="label" for="title">Title</label>
                        <input class="input" id="title" name="title" type="text" placeholder="Task title" />
                    </div>

                    <div class="field_group">
                        <label class="label" for="description">Description</label>
                        <input class="input" id="description" name="description" type="text" placeholder="Optional details..." />
                    </div>

                    <div class="field_group">
                        <span class="label">Status</span>
                        <div class="radio_group">
                            <label class="radio_label">
                                <input type="radio" id="pending" name="status" value="pending" />
                                <span class="radio_text">Pending</span>
                            </label>
                            <label class="radio_label">
                                <input type="radio" id="completed" name="status" value="completed" />
                                <span class="radio_text">Completed</span>
                            </label>
                        </div>
                    </div>

                    <div class="field_group">
                        <label class="label" for="due_date">Due Date</label>
                        <input class="input" id="due_date" name="due_date" type="datetime-local" />
                    </div>

                    <button type="submit" class="submit_btn">Save Changes</button>

                </form>

            </div>

        </div>

    </body>
</html>
